name: Stale Issue Management

on:
  schedule:
    - cron: '37 6 * * 1'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 90
          days-before-close: 14
          stale-issue-message: 'This issue has been automatically marked as stale due to 90 days of inactivity. It will be closed in 14 days if no further activity occurs.'
          stale-pr-message: 'This PR has been automatically marked as stale due to 90 days of inactivity. It will be closed in 14 days if no further activity occurs.'
          exempt-issue-labels: 'pinned,security'
          exempt-pr-labels: 'pinned'
