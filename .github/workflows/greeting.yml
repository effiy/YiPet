name: First Contributor Greeting

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  greet:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            感谢你提交第一个 issue！我们会尽快处理。

            Thank you for your first issue! We'll triage it soon.

          pr-message: |
            感谢你提交第一个 PR！请确保 `npm run check` 通过，填写 PR 模板内容即可。

            Thanks for your first PR! Please ensure `npm run check` passes and fill out the PR template.
