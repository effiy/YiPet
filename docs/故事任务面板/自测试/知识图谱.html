<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.1.0/theme.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.1.0/shared.css">
  <title>YiPet 自检 · 知识图谱</title>
  <style>
    :root {
      --bg: #1a1b26;
      --card: #24283b;
      --text: #a9b1d6;
      --text2: rgba(160,160,164,1);
      --text3: rgba(110,110,114,1);
      --accent: #7aa2f7;
      --cyan: #22d3ee;
      --border: 1px solid rgba(255,255,255,0.06);
      --shadow: 0 4px 20px rgba(0,0,0,0.3);
      --radius: 12px;
    }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeInDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    * { box-sizing:border-box;margin:0;padding:0 }
    html { scroll-behavior:smooth }
    body {
      background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;
      line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;
    }
    .container { max-width:1120px;margin:0 auto;padding:48px 24px 80px }
    .breadcrumb { display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:16px;font-size:.78rem;animation:fadeInDown .4s ease both }
    .breadcrumb a { color:var(--cyan);text-decoration:none;transition:color .15s }
    .breadcrumb a:hover { color:var(--accent);text-decoration:underline }
    .breadcrumb .sep { color:var(--text3);opacity:.4;user-select:none }
    .breadcrumb .current { color:var(--text2);font-weight:500 }
    .header { text-align:center;margin-bottom:24px;animation:fadeInDown .5s ease both }
    .header h1 { font-size:2.1rem;font-weight:700 }
    .header .sub { color:var(--text2);font-size:.9rem;margin-top:4px }
    .cross-nav { display:flex;gap:4px;justify-content:center;align-items:center;margin-bottom:32px;flex-wrap:wrap;animation:fadeInDown .5s .15s ease both }
    .cross-nav a { color:var(--cyan);text-decoration:none;font-size:.74rem;padding:3px 10px;border-radius:4px;transition:color .15s,background .15s }
    .cross-nav a:hover { color:var(--accent);background:rgba(122,162,247,.06);text-decoration:underline }
    .cross-nav a.on { color:var(--accent);font-weight:600 }
    .cross-nav .cross-sep { color:var(--text3);font-size:.5rem;opacity:.35;user-select:none }
    .content { animation:fadeInUp .5s ease both }
    .card { background:linear-gradient(159deg, rgba(38,38,52,1) 0%, rgba(34,34,46,1) 100%);border:var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow) }
    .card h3 { font-size:1.05rem;font-weight:600;margin:0 0 12px;color:var(--text2) }
    .card p { margin-bottom:12px;color:var(--text2);font-size:.9rem }
    .footer-note { text-align:center;color:var(--text3);font-size:.78rem;margin-top:32px;padding-bottom:20px }
    .legend { display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:.78rem;color:var(--text2) }
    .legend-item { display:flex;align-items:center;gap:6px }
    .legend-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0 }
    @media(max-width:768px) {
      .container { padding:24px 16px 60px }
      .header h1 { font-size:1.5rem }
      .cross-nav { gap:2px }
      .cross-nav a { font-size:.7rem;padding:2px 7px }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="breadcrumb">
      <a href="../../index.html">docs</a>
      <span class="sep">/</span>
      <span class="current">yipet-self-test</span>
    </div>
    <div class="cross-nav">
      <a href="故事任务.md">📋 故事任务</a>
      <span class="cross-sep">|</span>
      <a href="故事任务.md">🔍 自检全景</a>
      <span class="cross-sep">|</span>
      <a href="知识图谱.html" class="on">🔗 知识图谱</a>
      <span class="cross-sep">|</span>
      <a href="演示/index.html">💡 演示中心</a>
    </div>
    <div class="header">
      <h1>YiPet 自检 · 知识图谱</h1>
      <div class="sub">故事级知识图谱 — 领域 · 流程 · 步骤三层可视化</div>
    </div>
    <div class="content">
      <div class="card">
        <h3>🔗 知识图谱</h3>
        <p>交互式知识图谱可视化，展示领域、流程与步骤节点间的关系。数据源：<a href="知识图谱.json" style="color:var(--cyan)">知识图谱.json</a></p>
        <div id="cy" style="width:100%;height:800px;background:rgba(34,34,46,1);border-radius:8px;margin-top:16px"></div>
        <div class="legend">
          <div class="legend-item"><span class="legend-dot" style="background:#EC4899"></span>领域 (domain)</div>
          <div class="legend-item"><span class="legend-dot" style="background:#8B5CF6"></span>流程 (flow)</div>
          <div class="legend-item"><span class="legend-dot" style="background:#3B82F6"></span>步骤 (step)</div>
          <div class="legend-item"><span class="legend-dot" style="background:#3d59a1"></span>连线 (edge)</div>
        </div>
      </div>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
      <script>
        (async () => {
          const kg = await fetch('./知识图谱.json').then(r => r.json());

          const domainNodes = (kg.nodes?.domains || []).map(n => ({
            data: { id: n.id, label: n.name, type: 'domain', summary: n.summary || '', parent: '' }
          }));
          const flowNodes = (kg.nodes?.flows || []).map(n => ({
            data: { id: n.id, label: n.name, type: 'flow', summary: n.summary || '', parent: '' }
          }));
          const stepNodes = (kg.nodes?.steps || []).map(n => ({
            data: { id: n.id, label: n.name, type: 'step', summary: n.summary || '', parent: '' }
          }));
          const nodes = [...domainNodes, ...flowNodes, ...stepNodes];

          const edges = (kg.edges || []).map((e, i) => ({
            data: {
              id: 'e_' + i + '_' + e.source + '__' + e.target,
              source: e.source,
              target: e.target,
              label: e.type || '',
              type: e.type || '',
              weight: e.weight || 0.5
            }
          }));

          const cy = cytoscape({
            container: document.getElementById('cy'),
            elements: { nodes, edges },
            style: [
              {
                selector: 'node',
                style: {
                  'label': 'data(label)',
                  'background-color': '#24283b',
                  'color': '#a9b1d6',
                  'border-color': '#565f89',
                  'border-width': 1,
                  'font-size': '10px',
                  'text-valign': 'center',
                  'text-halign': 'center',
                  'text-wrap': 'wrap',
                  'text-max-width': '120px',
                  'width': 40,
                  'height': 40
                }
              },
              {
                selector: 'node[type="domain"]',
                style: {
                  'border-color': '#EC4899',
                  'background-color': '#2a1a2a',
                  'width': 60,
                  'height': 60,
                  'font-size': '12px',
                  'font-weight': 'bold'
                }
              },
              {
                selector: 'node[type="flow"]',
                style: {
                  'border-color': '#8B5CF6',
                  'background-color': '#1e1a2a',
                  'width': 45,
                  'height': 45
                }
              },
              {
                selector: 'node[type="step"]',
                style: {
                  'border-color': '#3B82F6',
                  'background-color': '#1a1e2a',
                  'width': 32,
                  'height': 32,
                  'font-size': '9px'
                }
              },
              {
                selector: 'edge',
                style: {
                  'width': 1,
                  'line-color': '#3d59a1',
                  'target-arrow-color': '#3d59a1',
                  'target-arrow-shape': 'triangle',
                  'curve-style': 'bezier',
                  'font-size': '7px',
                  'color': '#53576c',
                  'text-rotation': 'autorotate',
                  'opacity': 0.7
                }
              },
              {
                selector: 'edge[type="cross_domain"]',
                style: {
                  'line-color': '#f59e0b',
                  'target-arrow-color': '#f59e0b',
                  'line-style': 'dashed',
                  'width': 2,
                  'opacity': 0.9
                }
              },
              {
                selector: 'edge[type="contains_flow"]',
                style: {
                  'line-color': '#EC4899',
                  'target-arrow-color': '#EC4899'
                }
              },
              {
                selector: 'edge[type="flow_step"]',
                style: {
                  'line-color': '#8B5CF6',
                  'target-arrow-color': '#8B5CF6'
                }
              }
            ],
            layout: {
              name: 'cose',
              animate: false,
              nodeRepulsion: 5000,
              idealEdgeLength: 120,
              gravity: 0.15,
              padding: 40
            }
          });

          cy.on('tap', 'node', evt => {
            const n = evt.target.data();
            const typeLabel = { domain: '领域', flow: '流程', step: '步骤' }[n.type] || n.type;
            alert('[' + typeLabel + '] ' + n.label + '\n' + (n.summary || ''));
          });
        })();
      </script>
    </div>
    <div class="footer-note">yipet-self-test · 知识图谱 · 生成于 2026-06-10</div>
  </div>
</body>
</html>
