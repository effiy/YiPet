<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>温柔陪伴助手</title>
    <link rel="stylesheet" href="../../../assets/styles/base/theme.css" />
    <link rel="stylesheet" href="../../../assets/styles/tailwind.css" />
    <link rel="stylesheet" href="../../../assets/styles/popup.css" />
  </head>
  <body>
    <div id="notificationArea" class="notification-area" aria-live="polite" aria-relevant="additions"></div>

    <div class="popup-container">
      <header class="header">
        <div class="logo" data-icon="💕">
          <div class="brand">
            <h1>温柔陪伴</h1>
            <span class="brand-sub" id="modelText">模型：-</span>
          </div>
        </div>
        <div class="status-indicator" id="statusIndicator" role="status" aria-live="polite" aria-atomic="true">
          <span class="status-text">连接中…</span>
        </div>
      </header>

      <main class="main-content" id="mainContent">
        <section class="card" aria-labelledby="petSettingsTitle">
          <h2 id="petSettingsTitle" class="card-title">宠物设置</h2>

          <div class="setting-list">
            <div class="setting-row">
              <div class="setting-meta">
                <span class="setting-label-inline">显示宠物</span>
                <span class="setting-desc">在当前标签页显示/隐藏</span>
              </div>
              <label class="switch">
                <input id="visibilityToggle" type="checkbox" class="switch-input" aria-label="显示宠物" />
                <span class="switch-track" aria-hidden="true"></span>
              </label>
            </div>

            <div class="setting-row">
              <label for="sizeSlider" class="setting-label-inline">大小</label>
              <div class="slider-row">
                <input
                  id="sizeSlider"
                  class="slider"
                  type="range"
                  min="80"
                  max="400"
                  step="10"
                  aria-valuemin="80"
                  aria-valuemax="400"
                />
                <output id="sizeValue" class="value-pill" for="sizeSlider">-</output>
              </div>
            </div>

            <div class="setting-row">
              <label for="roleSelect" class="setting-label-inline">角色</label>
              <select id="roleSelect" class="select">
                <option value="教师">教师</option>
                <option value="医生">医生</option>
                <option value="甜品师">甜品师</option>
                <option value="警察">警察</option>
              </select>
            </div>

            <div class="setting-row">
              <label for="colorSelect" class="setting-label-inline">颜色主题</label>
              <select id="colorSelect" class="select">
                <option value="0">量子蓝紫（主色）</option>
                <option value="1">靛蓝紫</option>
                <option value="2">量子海洋</option>
                <option value="3">量子森林</option>
                <option value="4">量子日落</option>
              </select>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p id="hintText" class="hint-text">准备就绪</p>
        <span id="versionText" class="version-badge">v1.1.0</span>
      </footer>
    </div>

    <script src="../../../core/utils/logging/loggerUtils.js"></script>
    <script src="../../../core/utils/error/errorHandler.js"></script>
    <script src="../../../core/utils/storage/storageUtils.js"></script>
    <script src="../../../core/utils/dom/domHelper.js"></script>
    <script src="../../../core/utils/messaging/messageHelper.js"></script>
    <script src="../../../core/config.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
