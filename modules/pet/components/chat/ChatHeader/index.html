<template id="yi-pet-chat-header-template">
  <div class="yi-pet-chat-header" title="拖拽移动窗口 | 双击全屏" style="position: relative">
    <div class="yi-pet-chat-header-title" id="yi-pet-chat-header-title">
      <span style="font-size: 20px">💕</span>
      <span id="yi-pet-chat-header-title-text" style="font-weight: 600; font-size: 16px">与我聊天</span>
    </div>

    <div class="yi-pet-chat-header-buttons">
      <button
        id="yi-pet-chat-auth-btn"
        class="yi-pet-chat-header-btn"
        aria-label="API 鉴权"
        title="API 鉴权"
        @click.stop="onAuthClick"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M7 10V8a5 5 0 0 1 10 0v2h1a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h1Zm2 0h6V8a3 3 0 0 0-6 0v2Zm3 4a1 1 0 0 0-1 1v2a1 1 0 1 0 2 0v-2a1 1 0 0 0-1-1Z"
          />
        </svg>
      </button>
      <button
        id="yi-pet-chat-close-btn"
        class="yi-pet-chat-header-btn"
        aria-label="关闭聊天窗口"
        title="关闭"
        @click.stop="onCloseClick"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M18.3 5.71a1 1 0 0 0-1.41 0L12 10.59 7.11 5.7A1 1 0 1 0 5.7 7.11L10.59 12l-4.9 4.89a1 1 0 1 0 1.41 1.41L12 13.41l4.89 4.9a1 1 0 1 0 1.41-1.41L13.41 12l4.9-4.89a1 1 0 0 0-.01-1.4Z"
          />
        </svg>
      </button>
    </div>
  </div>
</template>
